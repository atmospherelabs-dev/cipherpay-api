name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # --deny unmaintained,unsound but NOT yanked:
      #   core2 is yanked but all zcash crates depend on it — upstream issue.
      #   Track: https://github.com/zcash/corez
      # RUSTSEC-2023-0071: Marvin Attack on rsa (transitive, no direct exposure)
      # RUSTSEC-2026-0097: (previous advisory, retained for safety)
      # RUSTSEC-2026-0105: core2 unmaintained — zcash upstream dependency
      - run: >-
          cargo audit
          --deny unmaintained --deny unsound
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0097
          --ignore RUSTSEC-2026-0105
